name: Test

on:
  - push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          cache: "pipenv"
      - run: python -m pip install pipenv
      - run: pipenv install
      - run: make bootstrap
      - run: make check
      - run: make test

  devcontainer:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: devcontainers/ci@v0.3
        with:
          runCmd: make bootstrap check test
